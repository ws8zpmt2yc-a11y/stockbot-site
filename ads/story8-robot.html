<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>StockBot story ad — a robot that trades stocks for you (animated)</title>
<style>
  :root{
    --orange:#E2560B; --cream:#F7F3EE; --ink:#17181A;
    --device:#101114; --device-2:#1A1C20; --green:#2EBD85;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:"Helvetica Neue",-apple-system,BlinkMacSystemFont,Arial,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1920px;font-family:var(--sans);overflow:hidden;
    background:#0B0C0E;display:flex;flex-direction:column;padding:250px 84px 300px}
  .hook{color:var(--cream);font-weight:900;font-size:128px;line-height:1.04;letter-spacing:-.04em}
  .hook span{display:block;transform-origin:0 50%}
  .hook .em{color:var(--orange)}
  .panel{margin-top:88px;background:var(--device);border:1px solid #26282D;border-radius:30px;
    overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.55)}
  .bar{display:flex;align-items:center;gap:14px;background:var(--device-2);padding:24px 30px}
  .dot{width:19px;height:19px;border-radius:50%}
  .tab{font-family:var(--mono);font-size:26px;color:#8A94A6;background:#101114;
    border-radius:10px;padding:10px 24px;margin-left:14px}
  .live{margin-left:auto;font-family:var(--mono);font-size:26px;color:var(--green);display:flex;align-items:center}
  .live i{display:inline-block;width:16px;height:16px;border-radius:50%;background:var(--green);margin-right:14px}
  .app{padding:44px 48px 40px}
  .lbl{font-family:var(--mono);font-size:26px;letter-spacing:.14em;color:#8A94A6}
  .val{font-family:var(--mono);font-size:80px;font-weight:700;color:var(--cream);margin-top:12px}
  svg{display:block;width:100%;margin-top:28px}
  .disc{margin-top:32px;font-family:var(--mono);font-size:21px;letter-spacing:.12em;color:#5B5E66;text-align:center}
  .foot{margin-top:auto;display:flex;align-items:center;justify-content:space-between}
  .brand{font-weight:900;font-size:44px;letter-spacing:-.03em;color:var(--cream)}
  .cta{color:var(--orange);font-weight:700;font-size:34px}
</style>
</head>
<body>
  <div class="hook">
    <span id="w1">A ROBOT THAT</span>
    <span id="w2">TRADES STOCKS</span>
    <span class="em" id="w3">FOR YOU.</span>
  </div>
  <div class="panel" id="aPanel">
    <div class="bar">
      <span class="dot" style="background:#F6465D"></span>
      <span class="dot" style="background:#F0B90B"></span>
      <span class="dot" style="background:#2EBD85"></span>
      <span class="tab">stockbot — portfolio</span>
      <span class="live"><i id="aDot"></i>LIVE</span>
    </div>
    <div class="app">
      <div class="lbl">TOTAL PORTFOLIO · PAPER</div>
      <div class="val" id="aVal">$106,902.14</div>
      <svg viewBox="0 0 200 56" preserveAspectRatio="none" style="height:200px">
        <polyline id="aLine" points="0,51 13,47 25,48 38,42 50,43 63,36 75,37 88,30 100,31 113,26 125,22 138,23 150,17 163,14 175,15 188,9 200,5"
          fill="none" stroke="#2EBD85" stroke-width="2.6" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>
  <div class="disc" id="aDisc">PAPER TRADING · SIMULATED RESULTS · NOT FINANCIAL ADVICE</div>
  <div class="foot" id="aFoot">
    <div class="brand">STOCKBOT</div>
    <div class="cta">Get StockBot → link in bio</div>
  </div>
<script>
  var q = new URLSearchParams(location.search);
  var F = q.has("f") ? +q.get("f") : 89;
  var T = F / 30;
  function cl(v){ return Math.max(0, Math.min(1, v)); }
  function P(s, d){ return cl((T - s) / d); }
  function E(t){ return t * t * (3 - 2 * t); }
  function slam(id, s){
    var el = document.getElementById(id), p = E(P(s, 0.36));
    el.style.opacity = p;
    el.style.transform = "scale(" + (1.6 - 0.6 * p) + ")";
  }
  slam("w1", 0.15); slam("w2", 0.42); slam("w3", 0.7);

  var pn = document.getElementById("aPanel"), pp = E(P(1.0, 0.55));
  pn.style.opacity = pp;
  pn.style.transform = "translateY(" + (40 * (1 - pp)) + "px)";

  var draw = E(P(1.25, 1.45));
  var line = document.getElementById("aLine");
  var L = line.getTotalLength();
  line.style.strokeDasharray = L;
  line.style.strokeDashoffset = L * (1 - draw);
  var v = 106902.14 + (107501.59 - 106902.14) * draw;
  document.getElementById("aVal").textContent =
    "$" + v.toLocaleString("en-US", {minimumFractionDigits: 2, maximumFractionDigits: 2});

  document.getElementById("aDot").style.opacity = 0.45 + 0.55 * Math.abs(Math.sin(Math.PI * T * 1.3));
  document.getElementById("aDisc").style.opacity = E(P(1.5, 0.6));
  document.getElementById("aFoot").style.opacity = E(P(2.3, 0.5));
</script>
</body>
</html>
