<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>StockBot ad — anti-hype</title>
<style>
  :root{
    --studio:#ECECEE; --ink:#17181A; --ink-soft:#5B5E66;
    --orange:#E2560B; --cream:#F7F3EE;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:"Helvetica Neue",-apple-system,BlinkMacSystemFont,Arial,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1080px;height:1350px;font-family:var(--sans);overflow:hidden;
    background:var(--studio);display:flex;flex-direction:column;padding:96px 88px 78px}
  .brand{font-weight:900;font-size:44px;letter-spacing:-.03em;color:var(--ink)}
  .hook{margin-top:130px;color:var(--ink);font-weight:900;font-size:100px;line-height:1.06;letter-spacing:-.04em}
  .hook em{font-style:normal;color:var(--orange)}
  .sub{margin-top:60px;color:var(--ink-soft);font-size:38px;line-height:1.5;max-width:850px}
  .sub b{color:var(--ink);font-weight:700}
  .foot{margin-top:auto;display:flex;align-items:center;justify-content:space-between}
  .cta{background:var(--orange);color:var(--cream);font-weight:700;font-size:34px;
    border-radius:99px;padding:30px 54px;box-shadow:0 14px 36px rgba(226,86,11,.30)}
  .note{font-family:var(--mono);font-size:21px;letter-spacing:.12em;color:#9B9DA3}
</style>
</head>
<body>
  <div class="brand">STOCKBOT</div>
  <div class="hook">MOST BOT ADS<br>PROMISE RICHES.<br><em>OURS PROMISES<br>YOUR SLEEP BACK.</em></div>
  <div class="sub"><b>Dry-run mode</b> lets you watch StockBot trade fake money until you trust it. Fully automatic entries, exits and stop-losses. No hype. No watching.</div>
  <div class="foot">
    <div class="cta">See it run — link in bio</div>
    <div class="note">NO FAKE WIN RATES · EVER</div>
  </div>
</body>
</html>
